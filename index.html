<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liga Maxi Básquet La Plata</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">Asociación Platense</p>
      <h1>Liga Maxi Básquet La Plata</h1>
      <p class="subtitulo">Fixture, resultados, tabla y herramientas de organización</p>
    </header>

    <div class="tabs">
      <button id="tab-liga" class="tab activo">Liga</button>
      <button id="tab-gestion" class="tab">Gestión</button>
    </div>

    <div id="vista-liga">
      <section class="card">
        <h3>Categoría</h3>
        <select id="categoria-select">
          <option value="Maxi +35 A">Maxi +35 A</option>
          <option value="Maxi +35 B">Maxi +35 B</option>
          <option value="Maxi +48">Maxi +48</option>
          <option value="Femenino">Femenino</option>
        </select>
      </section>

      <section class="card">
        <h3 id="tabla-titulo">Tabla de Posiciones</h3>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Equipo</th>
              <th>PJ</th>
              <th>PG</th>
              <th>PP</th>
              <th>GF</th>
              <th>GC</th>
              <th>DF</th>
              <th>PTS</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </section>

      <section class="card">
        <h3 id="fixture-titulo">Fixture</h3>
        <div id="fixture-body"></div>
      </section>

      <section class="card">
        <h3>Playoffs</h3>
        <div id="playoff-body"></div>
      </section>
    </div>
  </div>

  <!-- LIBRERÍA -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- APP -->
  <script src="app.js?v=final-1" defer></script>
</body>
</html>
