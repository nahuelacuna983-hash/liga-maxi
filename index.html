<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Liga Maxi Básquet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

  <h1>Liga Maxi Básquet</h1>

  <div class="tabs">
    <button id="tab-liga" class="tab activo">Liga</button>
    <button id="tab-gestion" class="tab">Gestión</button>
  </div>

  <!-- LIGA -->
  <div id="vista-liga">

    <select id="categoria-select">
      <option value="Maxi +35 A">Maxi +35 A</option>
      <option value="Maxi +35 B">Maxi +35 B</option>
      <option value="Maxi +48">Maxi +48</option>
      <option value="Femenino">Femenino</option>
    </select>

    <h3>Tabla</h3>
    <table>
      <thead>
        <tr>
          <th>#</th><th>Equipo</th><th>PJ</th><th>PG</th><th>PP</th><th>PTS</th>
        </tr>
      </thead>
      <tbody id="tabla-body"></tbody>
    </table>

    <h3>Fixture</h3>
    <div id="fixture-body"></div>

    <h3>Playoffs</h3>
    <div id="playoff-body"></div>

  </div>

  <!-- GESTION -->
  <div id="vista-gestion" style="display:none;">

    <button id="abrir-gestion-btn">Abrir gestión</button>
    <button id="cerrar-gestion-btn">Cerrar gestión</button>

    <div id="gestion-contenido" style="display:none;">

      <h3>Generar torneo</h3>
      <button id="generar-fixture">Generar Fixture</button>

      <h3>Resultados</h3>
      <select id="partido-select"></select>
      <input id="puntos-local" type="number">
      <input id="puntos-visitante" type="number">
      <button id="guardar-resultado">Guardar</button>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
