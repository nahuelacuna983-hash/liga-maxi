<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liga Maxi</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      margin-bottom: 16px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .ok {
      color: #0f766e;
      font-weight: 700;
    }

    .warn {
      color: #b45309;
      font-weight: 700;
    }

    .err {
      color: #b91c1c;
      font-weight: 700;
    }

    .muted {
      color: #6b7280;
    }

    .mono {
      font-family: Consolas, Monaco, monospace;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .debug-line {
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }

    .debug-line:last-child {
      border-bottom: none;
    }

    button {
      border: 0;
      background: #2563eb;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    pre {
      background: #111827;
      color: #f9fafb;
      padding: 16px;
      border-radius: 10px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="app" class="wrap">
    <div class="card">
      <h1>Liga Maxi</h1>
      <p class="muted">Cargando aplicación...</p>
    </div>
  </div>

  <!-- SOLO UNA VEZ -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- SOLO UNA VEZ -->
<script src="./liga-maxi/app.js?v=20260331-2" defer></script>
</body>
</html>
