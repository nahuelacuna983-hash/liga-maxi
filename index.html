<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Liga Maxi Básquet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Liga Maxi Básquet</h1>

    <div class="tabs">
      <button id="tab-publico" class="tab activo" type="button">Público</button>
      <button id="tab-delegados" class="tab" type="button">Delegados</button>
      <button id="tab-asociacion" class="tab" type="button">Asociación</button>
    </div>

    <!-- PUBLICO -->
    <div id="vista-liga">
      <select id="categoria-select">
        <option value="Maxi +35 A">Maxi +35 A</option>
        <option value="Maxi +35 B">Maxi +35 B</option>
        <option value="Maxi +48">Maxi +48</option>
        <option value="Femenino">Femenino</option>
      </select>

      <h3>Tabla</h3>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Equipo</th>
            <th>PJ</th>
            <th>PG</th>
            <th>PP</th>
            <th>PF</th>
            <th>PC</th>
            <th>DIF</th>
            <th>PTS</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>

      <h3>Fixture</h3>
      <div id="fixture-body"></div>

      <h3>Playoffs</h3>
      <div id="playoff-body"></div>
    </div>

    <!-- DELEGADOS -->
    <div id="vista-delegados" style="display:none;">
      <h3>Carga de resultados</h3>

      <div class="planner-grid">
        <div>
          <label for="delegado-categoria-select">Categoría</label>
          <select id="delegado-categoria-select">
            <option value="Maxi +35 A">Maxi +35 A</option>
            <option value="Maxi +35 B">Maxi +35 B</option>
            <option value="Maxi +48">Maxi +48</option>
            <option value="Femenino">Femenino</option>
          </select>
        </div>

        <div>
          <label for="delegado-partido-select">Partido</label>
          <select id="delegado-partido-select"></select>
        </div>

        <div>
          <label for="delegado-puntos-local">Puntos Local</label>
          <input id="delegado-puntos-local" type="number" placeholder="Puntos Local">
        </div>

        <div>
          <label for="delegado-puntos-visitante">Puntos Visitante</label>
          <input id="delegado-puntos-visitante" type="number" placeholder="Puntos Visitante">
        </div>
      </div>

      <div class="acciones">
        <button id="delegado-guardar-resultado" type="button">Guardar resultado</button>
      </div>
    </div>
<p id="delegado-sin-fixture-msg" style="display:none; margin-top:10px; font-weight:700;">
  Primero generá el fixture de esta categoría en Asociación.
</p>
    <!-- ASOCIACION -->
    <div id="vista-gestion" style="display:none;">
      <button id="abrir-gestion-btn" type="button">Abrir gestión</button>
      <button id="cerrar-gestion-btn" type="button">Cerrar gestión</button>

      <div id="gestion-contenido" style="display:none;">
        <h3>Planificador de Torneos</h3>
        <div class="acciones" style="margin-bottom: 14px;">
  <button id="bloquear-categoria-btn" type="button">Cerrar categoría</button>
  <button id="desbloquear-categoria-btn" type="button">Reabrir categoría</button>
  <span id="estado-categoria-badge" style="font-weight:700; margin-left:10px;"></span>
</div>

        <div class="planner-grid">
          <div>
            <label for="planner-categoria">Categoría</label>
            <select id="planner-categoria">
              <option value="Maxi +35 A">Maxi +35 A</option>
              <option value="Maxi +35 B">Maxi +35 B</option>
              <option value="Maxi +48">Maxi +48</option>
              <option value="Femenino">Femenino</option>
            </select>
          </div>

          <div>
            <label for="planner-equipos">Cantidad de equipos</label>
            <input id="planner-equipos" type="number" value="10" min="2">
          </div>

          <div>
            <label for="planner-formato">Competencia</label>
            <select id="planner-formato">
              <option value="apertura">Apertura - 1 rueda</option>
              <option value="clausura">Clausura - 1 rueda</option>
              <option value="anual">Anual - 2 ruedas</option>
              <option value="eliminacion">Eliminación directa</option>
            </select>
          </div>

          <div>
            <label for="planner-playoffs">Playoffs</label>
            <select id="planner-playoffs">
              <option value="no">No</option>
              <option value="si">Sí</option>
            </select>
          </div>

          <div>
            <label for="planner-clasificados">Clasificados</label>
            <select id="planner-clasificados">
              <option value="4">4 equipos</option>
              <option value="6">6 equipos</option>
              <option value="8">8 equipos</option>
            </select>
          </div>

          <div>
            <label for="planner-dia-juego">Día de juego</label>
            <select id="planner-dia-juego">
              <option value="0">Domingo</option>
              <option value="3">Miércoles</option>
            </select>
          </div>

          <div>
            <label for="planner-inicio">Inicio</label>
            <input id="planner-inicio" type="date">
          </div>

          <div>
            <label for="planner-fin">Fin</label>
            <input id="planner-fin" type="date">
          </div>

          <div>
            <label for="planner-frecuencia">Frecuencia</label>
            <select id="planner-frecuencia">
              <option value="1">Cada semana</option>
              <option value="2">Semana por medio</option>
            </select>
          </div>

          <div style="grid-column: 1 / -1;">
            <label for="planner-bloqueadas">Fechas bloqueadas (YYYY-MM-DD, separadas por coma)</label>
            <input id="planner-bloqueadas" type="text" placeholder="2026-05-03, 2026-05-25">
          </div>
        </div>

        <div class="acciones">
          <button id="planner-calcular" type="button">Calcular formato</button>
          <button id="generar-fixture" type="button">Generar Fixture</button>
        </div>

        <div id="planner-resultado" class="planner-resultado"></div>
        <div id="planner-comparacion" class="planner-resultado"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
